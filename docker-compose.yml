version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: oa-practice-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: oa_practice

  judge0:
    image: judge0/judge0:1.13.0
    container_name: oa-practice-judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    depends_on:
      - judge0-db
      - judge0-redis
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0

  judge0-db:
    image: postgres:13
    container_name: oa-practice-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
    volumes:
      - judge0_db_data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7-alpine
    container_name: oa-practice-judge0-redis
    restart: unless-stopped

volumes:
  mongo_data:
  judge0_db_data:
